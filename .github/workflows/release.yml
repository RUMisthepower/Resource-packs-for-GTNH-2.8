# ============================================================
# GitHub Actions Workflow для автоматического создания релиза
# ============================================================
#
# КАК ЭТО РАБОТАЕТ:
# 1. Вы создаёте и отправляете тег версии (например, v1.15)
#    git tag v1.15
#    git push origin v1.15
#
# 2. GitHub Actions автоматически запускает этот workflow
#
# 3. Workflow:
#    - Клонирует репозиторий
#    - Извлекает изменения последней версии из CHANGELOG.md
#    - Создаёт ZIP-архив (без служебных файлов)
#    - Создаёт релиз на GitHub и прикрепляет ZIP
#
# 4. Готово! ZIP-архив появится в разделе Assets релиза
#
# ============================================================

name: Create Release

on:
  push:
    tags:
      - 'v*'  # Запускать только при пуше тегов вида v1.0, v2.1.3 и т.д.

permissions:
  contents: write  # Необходимые права для создания релиза и загрузки файлов

jobs:
  build-and-release:
    runs-on: ubuntu-latest  # Используем последний образ Ubuntu
    steps:
      # ============================================================
      # Шаг 1: Клонируем репозиторий
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Получаем полную историю для работы с CHANGELOG

      # ============================================================
      # Шаг 2: Извлекаем изменения последней версии из CHANGELOG.md
      # ============================================================
      # Этот шаг читает CHANGELOG.md и берёт только секцию
      # последней версии (между заголовками ## [версия] и следующей ##)
      # Результат сохраняется во временный файл RELEASE_NOTES.md
      # ============================================================
      - name: Extract latest changelog entry
        run: |
          # Читаем CHANGELOG.md и извлекаем первую секцию после заголовка
          # Используем awk для поиска блока между "## [" и следующим "##"
          awk '
            /^## \[/ { 
              if (found) exit;  # Если уже нашли первую секцию, выходим
              found=1;          # Начинаем запись
              print;            # Печатаем заголовок
              next;
            }
            found { print }     # Печатаем всё содержимое секции
          ' CHANGELOG.md > RELEASE_NOTES.md
          
          # Показываем, что получилось (для отладки в логах)
          echo "=== RELEASE_NOTES.md ==="
          cat RELEASE_NOTES.md
          echo "========================"

      # ============================================================
      # Шаг 3: Создаём ZIP-архив из файлов репозитория
      # ============================================================
      # Архивируем все файлы, кроме:
      # - .git/ — служебная папка git
      # - .github/ — конфигурация CI/CD
      # - *.md — документация (кроме RELEASE_NOTES.md)
      # - docs/ — папка с документацией
      # ============================================================
      - name: Create ZIP archive
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: 'All-in-one-${{ github.ref_name }}.zip'
          path: '.'  # Архивируем всё содержимое репозитория
          exclusions: '*.git* .github/* *.md docs/ RELEASE_NOTES.md'  # Исключаем служебные файлы и документацию

      # ============================================================
      # Шаг 4: Публикуем релиз и прикрепляем ZIP-архив
      # ============================================================
      # Создаётся релиз на GitHub с:
      # - Названием версии (например, "Release v1.15")
      # - Описанием из RELEASE_NOTES.md (только последняя версия)
      # - Прикреплённым ZIP-архивом
      # ============================================================
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body_path: "RELEASE_NOTES.md"  # Описание из последней версии CHANGELOG
          draft: false            # false = релиз сразу публичный, true = черновик
          prerelease: false       # false = стабильная версия, true = пре-релиз
          files: |
            All-in-one-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Автоматический токен GitHub
